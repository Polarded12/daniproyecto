<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Cuidador</title>
  <link rel="stylesheet" href="css/estilos.css" />
  <link rel="stylesheet" href="css/alertas.css" />
</head>
<body>
  <main class="pantalla">
    <h1>Panel del Cuidador</h1>

    <section class="card" aria-live="polite">
      <h2>Informacion del paciente</h2>
      <p id="info-paciente-nombre">Nombre: -</p>
      <p id="info-paciente-edad">Edad: -</p>
      <p id="info-paciente-sexo">Sexo: -</p>
      <p id="info-paciente-lesion">Nivel de lesion: -</p>
      <p id="info-paciente-manejo">Tipo de manejo: -</p>
    </section>

    <section class="card" aria-live="polite">
      <h2>Resumen en tiempo real</h2>
      <p id="resumen-hidratacion">Hidratacion: 0 / 2000 ml</p>
      <div class="barra">
        <div id="barra-hidratacion-cuidador" class="barra-fill"></div>
      </div>
      <p id="ultimo-procedimiento">Ultimo procedimiento: sin registro</p>
    </section>

    <section class="card">
      <h2>Intervencion del cuidador</h2>
      <form id="form-procedimiento-cuidador">
        <label class="check-item"><input type="checkbox" name="lavadoManos" /> Lavado de manos</label>
        <label class="check-item"><input type="checkbox" name="materialLimpio" /> Material limpio</label>
        <label class="check-item"><input type="checkbox" name="tecnicaCorrecta" /> Tecnica correcta</label>
        <div class="grupo-botones">
          <button type="submit">Confirmar por paciente</button>
          <button id="btn-registrar-agua-cuidador" type="button">Registrar que tomo agua</button>
        </div>
      </form>
      <div class="grupo-botones">
        <button id="btn-confirmar-alerta" type="button">Confirmar alertas activas</button>
      </div>

      <h3>Notificaciones simuladas</h3>
      <div class="grupo-botones">
        <button id="btn-simular-agua" type="button">Simular alerta de agua</button>
        <button id="btn-simular-sonda" type="button">Simular cambio de sonda</button>
        <button id="btn-simular-procedimiento" type="button">Simular retraso procedimiento</button>
      </div>
      <p id="mensaje-cuidador" class="mensaje"></p>
    </section>

    <section id="alertas-cuidador" class="card" aria-live="polite">
      <h2>Alertas activas</h2>
      <div id="lista-alertas-cuidador"></div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/roles.js"></script>
  <script src="js/app.js?v=20260326d"></script>
</body>
</html>
